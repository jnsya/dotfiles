# Note: Default prefix is Ctrl+b. Uncomment below to use Ctrl+a (screen-style):
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Mouse support (click to focus panes/windows, scroll)
set -g mouse on

# True color support (required for nvim themes)
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No escape delay (important for nvim)
set -sg escape-time 0

# Start windows at 1 instead of 0
set -g base-index 1
set -g renumber-windows on

# Larger scrollback buffer
set -g history-limit 10000

# Vi keys in copy mode
setw -g mode-keys vi
