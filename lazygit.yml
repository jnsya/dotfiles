# Lazygit configuration
# https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  # Gruvbox dark theme
  theme:
    activeBorderColor:
      - '#fabd2f'  # gruvbox bright yellow
      - bold
    inactiveBorderColor:
      - '#a89984'  # gruvbox gray
    optionsTextColor:
      - '#83a598'  # gruvbox bright blue
    selectedLineBgColor:
      - '#3c3836'  # gruvbox dark highlight
    selectedRangeBgColor:
      - '#3c3836'
    cherryPickedCommitBgColor:
      - '#458588'  # gruvbox blue
    cherryPickedCommitFgColor:
      - '#fabd2f'  # gruvbox bright yellow
    unstagedChangesColor:
      - '#fb4934'  # gruvbox bright red
    defaultFgColor:
      - '#ebdbb2'  # gruvbox foreground

  # Show file icons (requires Nerd Font)
  nerdFontsVersion: "3"

  # Show a side-by-side diff in the main panel
  sidePanelWidth: 0.3333

# Confirm before quitting (avoids accidental exits)
confirmOnQuit: false
