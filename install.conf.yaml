- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.config/nvim: nvim
    ~/.zshrc: zshrc
    ~/.gitconfig: gitconfig
    ~/Brewfile: Brewfile
    ~/.config/starship.toml: starship.toml
    ~/.config/lazygit/config.yml: lazygit.yml
    ~/.tmux.conf: tmux.conf

- create:
    - ~/downloads
    - ~/.config/lazygit

- shell:
  - [git submodule update --init --recursive, Installing submodules]

